# -------------------------- 模型配置 --------------------------
network: TransNet  # 模型名称（与TransNet类对应，已适配classify_drop）
network_args:
  num_classes: 6         # 分类类别数（手写任务：笔画5类+拼音6类=11类？需确认实际类别数，暂保留10）
  num_samples: 1000       # 每个EEG样本的时间点数量（与手写数据集1000采样点匹配）
  num_channels: 32        # EEG通道数（32导电极，与数据集匹配）
  embed_dim: 32           # 嵌入维度（32%8=0，满足多头注意力头数整除要求）
  pool_size: 80           # 时间维度池化核大小（修正：原180超出1000采样点范围，80更合理）
  pool_stride: 15         # 时间维度池化步长（(1000-80)/15 +1 = 62，池化后维度为整数）
  num_heads: 8            # 多头注意力头数（32%8=0，合法）
  fc_ratio: 16            # 前馈网络隐藏层维度比例（32*16=512，平衡模型复杂度）
  depth: 4                # Transformer编码器层数（4层适配小样本，16层易过拟合，暂保留4）
  attn_drop: 0.5          # 注意力层Dropout概率（正则化）
  fc_drop: 0.5            # 前馈网络Dropout概率（正则化）
  classify_drop: 0.5      # 分类器前Dropout概率（与模型代码新增参数匹配）

# -------------------------- 数据配置 --------------------------
data_path: F:/EEG-TransNet-main/dataset/bci_handwriting_data_Pinyin  # 数据根路径
out_folder: F:/EEG-TransNet-main/output/bci_handwriting_data_Pinyin  # 训练结果输出根路径

# -------------------------- 训练配置 --------------------------
device: cuda:0            # 修正：原preferred_device改为device（与训练代码参数名一致）
batch_size: 64            # 批次大小（若GPU显存不足，可降为32/16）
random_seed: 0            # 随机种子（保证训练可复现）
k_folds: 5                # 新增：5折交叉验证（训练代码核心参数）
num_epochs: 200           # 固定训练轮次
lr: 0.0002                # 学习率（Adam优化器适配值）
weight_decay: 1e-4        # L2正则化系数（4%的权重衰减，抑制过拟合）
label_smoothing: 0.01     # 新增：轻量标签平滑（提升泛化能力）

